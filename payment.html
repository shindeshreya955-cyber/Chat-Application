<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fee Payment Form</title>
  <link rel="stylesheet" href="payment.css">
</head>
<body>

<header class="header">
  <h1>💳 NKOCET Fee Payment</h1>
</header>

  <section class="payment-section">
    <h2 class="section-title">Enter Payment Details</h2>

    <!-- Payment Form -->
    <form id="paymentForm" class="payment-form">

      <!-- Student Info -->
      <fieldset>
        <legend>Student Information</legend>
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>
        <label for="roll">Roll Number</label>
        <input type="text" id="roll" placeholder="Enter roll number" required>
        <label for="category">Caste / Category</label>
        <select id="category" required>
          <option value="">Select Category</option>
          <option value="General">General</option>
          <option value="OBC">OBC</option>
          <option value="SC/ST">SC/ST</option>
        </select>
      </fieldset>

      <!-- Payment Method -->
      <fieldset>
        <legend>Payment Method</legend>

        <div class="payment-method">
          <input type="radio" name="method" id="card" value="Card" required>
          <label for="card">Credit / Debit Card</label>
        </div>

        <div class="payment-method">
          <input type="radio" name="method" id="upi" value="UPI">
          <label for="upi">UPI / QR Code</label>
        </div>

        <div class="payment-method">
          <input type="radio" name="method" id="netbanking" value="Net Banking">
          <label for="netbanking">Net Banking</label>
        </div>
      </fieldset>

      <!-- Card Details (Shown only if Card selected) -->
      <div class="card-details" id="cardDetails">
        <label for="cardNumber">Card Number</label>
        <input type="text" id="cardNumber" placeholder="XXXX-XXXX-XXXX-XXXX">
        <div class="card-info">
          <label for="expiry">Expiry</label>
          <input type="text" id="expiry" placeholder="MM/YY">
          <label for="cvv">CVV</label>
          <input type="text" id="cvv" placeholder="XXX">
        </div>
      </div>

      <!-- UPI QR Code -->
      <div class="upi-qrcode" id="upiQR">
        <p>Scan the QR code to pay via UPI:</p>
        <canvas id="qrCanvas"></canvas>
      </div>

      <button type="submit" class="pay-btn">Pay Now ₹60,000</button>
    </form>
  </section>

  <!-- Payment Success Message -->
  <div class="toast" id="paymentToast">Payment Successful ✅</div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="payment.js"></script>
</body>
</html>
