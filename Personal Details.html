<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Profile Generator</title>
  <link rel="stylesheet" href="Personal Details.css">
</head>
<body>
  <div class="container">
    <h1>🎓 College Student Profile</h1>

    <!-- Form -->
    <form id="studentForm">
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="text" id="roll" placeholder="Roll Number" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="text" id="department" placeholder="Department" required>
      <input type="text" id="contact" placeholder="contact" required>
      <input type="text" id="Address" placeholder="Address" required>
      <select id="year" required>
        <option value="">Select Year</option>
        <option value="1st Year">1st Year</option>
        <option value="2nd Year">2nd Year</option>
        <option value="3rd Year">3rd Year</option>
        <option value="4th Year">4th Year</option>
      </select>
      <select id="Gender" required>
        <option value="">Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
      </select>

      <!-- Profile Picture Upload -->
  <label for="profilePic" class="profile-label">Upload Profile Picture</label>
  <input type="file" id="profilePic" accept="image/*">

  <button type="submit">Create Profile</button>
</form>

<!-- Profiles will appear here -->
<div id="profiles" class="profiles"></div>

      <button type="submit">Create Profile</button>
    </form>




  <script src="Personal Details.js"></script>
</body>
</html>
