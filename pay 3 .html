<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NKOCET Payment Portal</title>
  <link rel="stylesheet" href="pay 3 .css">
</head>
<body>
  <header class="payment-header">
    <h1>NKOCET Fee Payment</h1>
  </header>

  <section class="payment-section">
    <h2>Select Payment Method</h2>
    <div class="payment-methods">
      <button class="method-btn active" data-method="card">💳 Credit/Debit Card</button>
      <button class="method-btn" data-method="upi">📱 UPI</button>
      <button class="method-btn" data-method="netbanking">🏦 Net Banking</button>
      <button class="method-btn" data-method="qr">📷 QR Code</button>
    </div>

    <!-- Payment Form -->
    <form id="paymentForm" class="payment-form">
      <div class="form-group">
        <label for="studentName">Student Name</label>
        <input type="text" id="studentName" placeholder="Enter your name" required>
      </div>

      <div class="form-group">
        <label for="rollNo">Roll Number</label>
        <input type="text" id="rollNo" placeholder="Enter roll number" required>
      </div>

      <div class="form-group">
        <label for="amount">Amount (₹)</label>
        <input type="number" id="amount" value="40000" readonly>
      </div>

      <div id="cardFields" class="method-fields">
        <div class="form-group">
          <label for="cardNo">Card Number</label>
          <input type="text" id="cardNo" placeholder="1234 5678 9012 3456" maxlength="16">
        </div>
        <div class="form-group-inline">
          <div>
            <label for="expiry">Expiry</label>
            <input type="text" id="expiry" placeholder="MM/YY" maxlength="5">
          </div>
          <div>
            <label for="cvv">CVV</label>
            <input type="text" id="cvv" placeholder="123" maxlength="3">
          </div>
        </div>
      </div>

      <div id="upiFields" class="method-fields hidden">
        <div class="form-group">
          <label for="upiId">UPI ID</label>
          <input type="text" id="upiId" placeholder="example@bank">
        </div>
      </div>

      <div id="netbankingFields" class="method-fields hidden">
        <div class="form-group">
          <label for="bank">Select Bank</label>
          <select id="bank">
            <option value="">--Select Bank--</option>
            <option>HDFC Bank</option>
            <option>ICICI Bank</option>
            <option>SBI</option>
            <option>Axis Bank</option>
          </select>
        </div>
      </div>

      <div id="qrFields" class="method-fields hidden">
        <p>Scan the QR code below with your banking app:</p>
        <img src="qr-placeholder.png" alt="QR Code" class="qr-code">
      </div>

      <button type="submit" class="pay-btn">Pay Now</button>
    </form>

    <div id="successMessage" class="success-message hidden">
      ✅ Payment Successful!
    </div>
  </section>

  <script src="pay 3 .js"></script>
</body>
</html>
