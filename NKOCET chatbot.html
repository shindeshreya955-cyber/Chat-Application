<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NKOCET Smart Chatbot</title>
  <link rel="stylesheet" href="NKOCET chatbot.css">
</head>
<body>

<section class="chatbot-section fade-in">
  <div class="chatbot-container">

    <div class="chatbot-header">
      <img src="college logo.jpg" alt="NKOCET Logo" class="college-logo">
      <h2>🎓 NKOCET Smart Assistant</h2>
      <p>Ask anything about fees, scholarships, hostel, or exams!</p>
    </div>

    <div class="chat-window" id="chatWindow">
      <div class="bot-message">👋 Hello! How can I assist you today?</div>
    </div>

    <div class="chat-options">
      <button class="chat-option" data-reply="Fee Details 💰">Fee Details</button>
      <button class="chat-option" data-reply="Scholarship Information 🎓">Scholarship</button>
      <button class="chat-option" data-reply="Hostel Accommodation 🏠">Hostel</button>
      <button class="chat-option" data-reply="Exam Form Deadlines 🧾">Exams</button>
      <button class="chat-option" data-reply="Contact Administration 📞">Contact</button>
    </div>

    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Type your question...">
      <button id="sendBtn">Send</button>
    </div>
  </div>
</section>

<footer class="footer fade-in">
  <p>© 2025 NKOCET College. All Rights Reserved.</p>
  <div class="social-icons">
    <a href="https://static.vecteezy.com/system/resources/previews/018/930/476/original/facebook-logo-facebook-icon-transparent-free-png.png"><i class="fab fa-facebook"></i></a>
    <a href="#"><i class="fab fa-instagram"></i></a>
    <a href="#"><i class="fab fa-linkedin"></i></a>
    <a href="#"><i class="fab fa-twitter"></i></a>
  </div>
</footer>

<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
<script src="NKOCET chatbot.js"></script>
</body>
</html>
